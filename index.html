<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card shadow p-4" style="width: 400px;">
        
        <h3 class="text-center mb-3">Lista de Tareas</h3>

        <img src="https://unevoc.unesco.org/network/up/senati_ff-01.jpg"
             class="img-fluid d-block mx-auto mb-3"
             width="120">

        <div class="input-group mb-3">
            <input type="text" id="tarea" class="form-control" placeholder="Escribe una tarea">
            <button class="btn btn-success" onclick="agregarTarea()">Agregar</button>
        </div>

        <ul id="lista" class="list-group"></ul>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
